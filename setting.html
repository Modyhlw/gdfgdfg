<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | Movie Masaar</title>
    <link rel="stylesheet" href="setting.css">
</head>
<body>
    <div class="settings-container">
        <!-- Header with back button -->
        <div class="settings-header">
            <i class="fas fa-arrow-left back-btn"></i>
            <h1>Settings</h1>
        </div>

        <!-- Profile Card -->
        <div class="profile-card">
            <img src="WhatsApp Image 2026-04-11 at 11.50.32 PM.jpeg" alt="User">
            <div class="profile-info">
                <h3>RAIN TEAM

</h3>
                <p>Premium Member</p>
            </div>
            <i class="fas fa-chevron-right"></i>
        </div>

        <div class="settings-list">
            <!-- General Section -->
            <p class="section-title">General</p>
            
            <div class="setting-item">
                <div class="icon-box blue">
                    <i class="fas fa-video"></i>
                </div>
                <div class="item-info">
                    <span>Video Quality</span>
                    <p class="sub-text">Currently: Ultra HD (4K)</p>
                </div>
                <select class="custom-select">
                    <option>Data Saver</option>
                    <option>Standard</option>
                    <option selected>High (4K)</option>
                </select>
            </div>

            <div class="setting-item">
                <div class="icon-box orange">
                    <i class="fas fa-globe"></i>
                </div>
                <div class="item-info">
                    <span>App Language</span>
                </div>
                <select class="custom-select">
                    <option>Arabic</option>
                    <option selected>English</option>
                    <option>French</option>
                </select>
            </div>

            <!-- Playback Settings Section -->
            <p class="section-title">Playback Settings</p>

            <div class="setting-item">
                <div class="icon-box purple">
                    <i class="fas fa-play-circle"></i>
                </div>
                <div class="item-info">
                    <span>Autoplay Next Episode</span>
                </div>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider round"></span>
                </label>
            </div>

            <div class="setting-item">
                <div class="icon-box green">
                    <i class="fas fa-closed-captioning"></i>
                </div>
                <div class="item-info">
                    <span>Subtitles Appearance</span>
                </div>
                <i class="fas fa-chevron-right arrow"></i>
            </div>

            <!-- Storage & Data Section -->
            <p class="section-title">Storage & Data</p>

            <div class="setting-item">
                <div class="icon-box red">
                    <i class="fas fa-trash-alt"></i>
                </div>
                <div class="item-info">
                    <span>Delete All Downloads</span>
                </div>
                <span class="data-info">1.2 GB</span>
            </div>
        </div>
    </div>
</body>
</html>
